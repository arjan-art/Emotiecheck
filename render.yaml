services:
  - type: web
    name: emotiecheck
    runtime: node
    plan: free
    buildCommand: rm -rf node_modules && npm cache clean --force && rm -f package-lock.json && npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: emotiecheck-db
          property: connectionString
      - key: APP_ID
        generateValue: true
      - key: APP_SECRET
        generateValue: true
    healthCheckPath: /api/trpc/ping

databases:
  - name: emotiecheck-db
    plan: free
    ipAllowList: []